services:
  server:
    build:
      context: ./apps/server
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_PATH: /data/wub.db
    # expose:
    #   - "8080"
    networks:
      - wub_internal
    volumes:
      - ./apps/server/data:/data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "--quiet",
          "http://localhost:8080/api/health",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "3030:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - wub_internal
    volumes:
      - ./apps/web/build:/srv:ro
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config

networks:
  wub_internal:
    driver: bridge
