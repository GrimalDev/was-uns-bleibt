services:
  server:
    image: golang:1.24-alpine
    build: !reset null
    environment:
      PORT: "8080"
      DATABASE_PATH: /data/wub.db
    working_dir: /src
    command: go run .
    volumes:
      - ./apps/server:/src
      - ./apps/server/data:/data
      - ./docker-data/go-cache:/go

  web:
    image: oven/bun:1
    working_dir: /src
    command: sh -c "bun install && bun run dev -- --host 0.0.0.0"
    volumes:
      - ./apps/web:/src
      - ./docker-data/web-node-modules:/src/node_modules
    networks:
      - wub_internal

  caddy:
    depends_on:
      server:
        condition: service_started
      web:
        condition: service_started
    volumes: !override
      - ./caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
